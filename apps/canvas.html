<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>作曲キャンバス — music-suite</title>
<style>
:root{
  --bg:#0a0a0d;--bg2:#121217;--bg3:#1a1a22;--bg4:#22222e;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.14);
  --tx:#eeedf8;--tx2:#8886a0;--tx3:#4a4860;
  --acc:#7f77dd;--acc-hi:#afa9ec;--acc-bg:rgba(127,119,221,0.12);--acc-bd:rgba(127,119,221,0.3);
  --green:#1d9e75;--green-hi:#5dcaa5;--green-bg:rgba(29,158,117,0.1);--green-bd:rgba(29,158,117,0.3);
  --amber:#ef9f27;--amber-hi:#f5c05a;--amber-bg:rgba(239,159,39,0.1);--amber-bd:rgba(239,159,39,0.3);
  --red:#e24b4a;--red-bg:rgba(226,75,74,0.1);--red-bd:rgba(226,75,74,0.3);
  --ai:#a855f7;--ai-hi:#c084fc;--ai-bg:rgba(168,85,247,0.1);--ai-bd:rgba(168,85,247,0.25);
  --purple:#8b5cf6;--pink:#ec4899;--pink-bg:rgba(236,72,153,0.1);--pink-bd:rgba(236,72,153,0.3);
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:'Inter','Hiragino Sans','Yu Gothic UI',sans-serif;font-size:13px;}

/* ── TOPBAR ── */
#topbar{
  height:48px;background:var(--bg2);border-bottom:0.5px solid var(--bd);
  display:flex;align-items:center;gap:10px;padding:0 16px;flex-shrink:0;z-index:100;
}
.logo{font-size:12px;font-weight:600;letter-spacing:0.1em;color:var(--tx2);text-transform:uppercase;}
.logo em{color:var(--acc-hi);font-style:normal;}
.tb-sep{width:1px;height:20px;background:var(--bd2);}
.btn{padding:5px 12px;border:0.5px solid var(--bd2);background:none;color:var(--tx2);
  border-radius:var(--r);font-size:12px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn:hover{background:var(--bg3);color:var(--tx);}
.btn.primary{border-color:var(--acc-bd);background:var(--acc-bg);color:var(--acc-hi);}
.btn.danger{border-color:var(--red-bd);color:var(--red);}
.btn:disabled{opacity:0.35;cursor:not-allowed;}
#zoom-disp{font-size:11px;color:var(--tx3);min-width:40px;text-align:center;}
.spacer{flex:1;}
#card-count{font-size:11px;color:var(--tx3);}

/* ── GROUP PALETTE ── */
#group-palette{
  height:40px;background:var(--bg2);border-bottom:0.5px solid var(--bd);
  display:flex;align-items:center;gap:6px;padding:0 16px;flex-shrink:0;overflow-x:auto;
}
.group-chip{
  padding:4px 12px;border-radius:20px;border:0.5px solid;font-size:11px;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:all 0.15s;user-select:none;
}
.group-chip:hover{opacity:0.8;}
.group-chip.selected{box-shadow:0 0 0 2px rgba(255,255,255,0.2);}
.gp-label{font-size:10px;color:var(--tx3);margin-right:4px;flex-shrink:0;}
.add-group-btn{padding:4px 10px;border-radius:20px;border:0.5px dashed var(--bd2);
  background:none;color:var(--tx3);font-size:11px;cursor:pointer;white-space:nowrap;}
.add-group-btn:hover{border-color:var(--bd2);color:var(--tx2);}

/* ── CANVAS ── */
#canvas-wrap{flex:1;overflow:auto;position:relative;cursor:default;}
#canvas-wrap.panning{cursor:grab;}
#canvas-wrap.panning:active{cursor:grabbing;}
#canvas{
  position:relative;
  width:3000px;height:2000px;
  background-image:
    radial-gradient(circle,rgba(255,255,255,0.06) 1px,transparent 1px);
  background-size:32px 32px;
}

/* ── PHRASE CARD ── */
.pcard{
  position:absolute;width:180px;
  background:var(--bg3);border:0.5px solid var(--bd2);border-radius:var(--r);
  padding:10px 12px;cursor:grab;user-select:none;
  transition:box-shadow 0.15s,border-color 0.15s;
  z-index:10;
}
.pcard:hover{border-color:var(--bd2);box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.pcard.dragging{opacity:0.85;box-shadow:0 8px 32px rgba(0,0,0,0.6);z-index:50;cursor:grabbing;}
.pcard.selected{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc);}
.pcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.pcard-name{font-size:12px;font-weight:600;color:var(--tx);line-height:1.4;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;}
.pcard-del{width:16px;height:16px;border:none;background:none;color:var(--tx3);
  cursor:pointer;font-size:11px;flex-shrink:0;border-radius:3px;display:flex;align-items:center;justify-content:center;opacity:0;}
.pcard:hover .pcard-del{opacity:1;}
.pcard-del:hover{color:var(--red);background:var(--red-bg);}
.pcard-notes{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;min-height:20px;}
.pcard-note{font-size:9px;font-weight:600;padding:1px 5px;border-radius:20px;
  background:var(--acc-bg);color:var(--acc-hi);}
.pcard-note.ai{background:var(--ai-bg);color:var(--ai-hi);}
.pcard-footer{display:flex;align-items:center;justify-content:space-between;}
.pcard-emotion{font-size:9px;padding:1px 5px;border-radius:20px;
  background:var(--green-bg);color:var(--green-hi);}
.pcard-ai-tag{font-size:9px;color:var(--ai-hi);}
.pcard-play{font-size:10px;padding:2px 7px;border:0.5px solid var(--bd2);background:none;
  color:var(--tx3);border-radius:20px;cursor:pointer;transition:all 0.15s;}
.pcard-play:hover{border-color:var(--green-bd);color:var(--green-hi);background:var(--green-bg);}
.pcard-play.playing{border-color:var(--amber-bd);color:var(--amber-hi);background:var(--amber-bg);}

/* group color bar */
.pcard-gbar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;}

/* ── GROUP ZONE ── */
.gzone{
  position:absolute;border-radius:var(--r);border:1.5px dashed;
  pointer-events:none;z-index:1;
  display:flex;align-items:flex-start;padding:8px 10px;
}
.gzone-label{font-size:10px;font-weight:600;opacity:0.7;}

/* ── SIDEBAR ── */
#sidebar{
  width:200px;flex-shrink:0;background:var(--bg2);border-left:0.5px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-head{padding:12px 14px 10px;border-bottom:0.5px solid var(--bd);}
.sb-title{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--tx3);}
.sb-list{flex:1;overflow-y:auto;padding:8px;}
.sb-card{
  padding:8px 10px;border:0.5px solid var(--bd);border-radius:var(--r);
  margin-bottom:5px;cursor:pointer;transition:all 0.15s;background:var(--bg3);
}
.sb-card:hover{border-color:var(--bd2);background:var(--bg4);}
.sb-card.on-canvas{opacity:0.45;cursor:default;}
.sb-card-name{font-size:11px;font-weight:500;color:var(--tx);margin-bottom:3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-card-meta{font-size:10px;color:var(--tx3);}
.sb-empty{padding:16px;text-align:center;color:var(--tx3);font-size:11px;line-height:1.8;}

/* ── CARD DETAIL BUTTON ── */
.pcard-info-btn,.sb-info-btn{
  width:16px;height:16px;border:none;background:none;color:var(--tx3);cursor:pointer;
  font-size:10px;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.pcard-info-btn:hover,.sb-info-btn:hover{background:var(--bg4);color:var(--acc-hi);}
.sb-card-top{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:3px;}

/* ── CARD DETAIL MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:900;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.15s;
}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal-panel{
  width:420px;max-width:90vw;max-height:80vh;overflow-y:auto;
  background:var(--bg2);border:0.5px solid var(--bd2);border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  transform:translateY(12px);transition:transform 0.15s;
}
.modal-overlay.show .modal-panel{transform:translateY(0);}
.modal-header{
  padding:16px 18px 12px;border-bottom:0.5px solid var(--bd);
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.modal-title{font-size:15px;font-weight:600;color:var(--tx);word-break:break-all;}
.modal-close{width:24px;height:24px;border:none;background:none;color:var(--tx3);cursor:pointer;
  font-size:14px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--bg3);color:var(--tx);}
.modal-body{padding:14px 18px 18px;display:flex;flex-direction:column;gap:14px;}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;}
.modal-badge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bg3);color:var(--tx2);border:0.5px solid var(--bd2);}
.modal-badge.emotion{background:var(--green-bg);color:var(--green-hi);border-color:var(--green-bd);}
.modal-badge.ai{background:var(--ai-bg);color:var(--ai-hi);border-color:var(--ai-bd);}
.modal-section-title{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:6px;}
.modal-notes{display:flex;gap:4px;flex-wrap:wrap;background:var(--bg3);border-radius:var(--r);padding:8px 10px;min-height:32px;}
.modal-note{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--acc-bg);color:var(--acc-hi);}
.modal-note.ai{background:var(--ai-bg);color:var(--ai-hi);}
.modal-comment{font-size:12px;color:var(--tx2);line-height:1.7;background:var(--bg3);border-radius:var(--r);padding:8px 10px;}
.modal-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-meta-item{font-size:11px;color:var(--tx3);}
.modal-meta-item b{color:var(--tx2);font-weight:600;}
.order-panel{border-top:0.5px solid var(--bd);max-height:38%;min-height:120px;display:flex;flex-direction:column;}
.order-head{padding:10px 14px 8px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.order-title{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--tx3);}
.order-hint{font-size:9px;color:var(--tx3);}
.order-list{overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px;}
.order-item{display:grid;grid-template-columns:18px 1fr auto;gap:6px;align-items:center;padding:7px 8px;border:0.5px solid var(--bd);border-radius:var(--r);background:var(--bg3);}
.order-item.selected{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc);}
.order-num{font-size:10px;color:var(--tx3);text-align:right;}
.order-name{font-size:11px;font-weight:500;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.order-actions{display:flex;gap:2px;}
.mini-btn{width:20px;height:20px;border:0.5px solid var(--bd2);background:none;color:var(--tx3);border-radius:5px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mini-btn:hover{background:var(--bg4);color:var(--tx);}
.mini-btn:disabled{opacity:0.25;cursor:not-allowed;}
.sb-footer{padding:10px 8px;border-top:0.5px solid var(--bd);display:flex;flex-direction:column;gap:6px;}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;}
.body{display:flex;flex:1;overflow:hidden;}

/* ── TOAST ── */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--bg3);border:0.5px solid var(--bd2);border-radius:var(--r);
  padding:7px 16px;font-size:12px;color:var(--tx);
  transition:transform 0.22s;pointer-events:none;z-index:999;}
.toast.show{transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo"><em>作曲</em>キャンバス</div>
  <div class="tb-sep"></div>
  <button class="btn" onclick="zoomIn()">＋</button>
  <span id="zoom-disp">100%</span>
  <button class="btn" onclick="zoomOut()">－</button>
  <button class="btn" onclick="resetZoom()">リセット</button>
  <div class="tb-sep"></div>
  <button class="btn" onclick="autoLayout()">⊞ 自動整列</button>
  <button class="btn primary" onclick="reloadCards()">↺ カード再読み込み</button>
  <div class="spacer"></div>
  <span id="card-count"></span>
  <div class="tb-sep"></div>
  <a class="btn" href="vocal-lab.html">← vocal-lab</a>
  <a class="btn" href="../index.html">⌂ ハブ</a>
</div>

<!-- GROUP PALETTE -->
<div id="group-palette">
  <span class="gp-label">グループ:</span>
</div>

<!-- BODY -->
<div class="body">
  <!-- CANVAS -->
  <div id="canvas-wrap">
    <div id="canvas"></div>
  </div>
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-head"><div class="sb-title">フレーズカード</div></div>
    <div class="sb-list" id="sb-list"></div>
    <div class="order-panel">
      <div class="order-head">
        <div class="order-title">曲順</div>
        <div class="order-hint">上下で送信順</div>
      </div>
      <div class="order-list" id="order-list"></div>
    </div>
    <div class="sb-footer">
      <button class="btn" onclick="clearCanvas()">キャンバスをクリア</button>
      <button class="btn primary" onclick="exportLayout()">レイアウト保存</button>
      <button class="btn" onclick="sendToScoreEditor()" style="border-color:var(--ai-bd);color:var(--ai-hi);">🎼 score-editorへ送る</button>
    </div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="detail-modal" onclick="if(event.target===this) closeCardDetail()">
  <div class="modal-panel" id="detail-modal-panel"></div>
</div>

<script>
'use strict';

/* ══════════════════════════════════
   GROUPS 定義
══════════════════════════════════ */
const DEFAULT_GROUPS = [
  { id:'g-intro',    label:'イントロ',  color:'#74b9ff', border:'rgba(116,185,255,0.4)' },
  { id:'g-verse',    label:'Aメロ',     color:'#a29bfe', border:'rgba(162,155,254,0.4)' },
  { id:'g-bridge',   label:'Bメロ',     color:'#55efc4', border:'rgba(85,239,196,0.4)'  },
  { id:'g-chorus',   label:'サビ',      color:'#ff6b9d', border:'rgba(255,107,157,0.4)' },
  { id:'g-outro',    label:'アウトロ',  color:'#feca57', border:'rgba(254,202,87,0.4)'  },
  { id:'g-idea',     label:'アイデア',  color:'#7f77dd', border:'rgba(127,119,221,0.4)' },
  { id:'g-rejected', label:'没案',      color:'#636e72', border:'rgba(99,110,114,0.4)'  },
  { id:'g-modulate', label:'転調案',    color:'#e17055', border:'rgba(225,112,85,0.4)'  },
];

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
const state = {
  cards:       [],   // vocal-lab-v3 から読み込んだカード
  layout:      {},   // {cardId: {x,y,groupId}}
  sequence:    [],   // score-editorへ送る明示的な曲順
  groups:      [...DEFAULT_GROUPS],
  activeGroup: null, // 選択中グループID（カードに割り当て用）
  zoom:        1.0,
  dragging:    null, // {cardId, ox, oy}
  selectedCard: null,
  playingCard:  null,
  audioCtx:    null,
  playSynth:   null,
};

const LAYOUT_KEY = 'msuite_canvas_layout';
const CARDS_KEY  = 'vl3_cards';

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
function init() {
  loadCards();
  loadLayout();
  normalizeSequence();
  renderGroupPalette();
  renderSidebar();
  renderOrderPanel();
  renderCanvas();
  updateCardCount();
}

/* ══════════════════════════════════
   CARDS — vocal-lab-v3 から読み込み
══════════════════════════════════ */
function loadCards() {
  try {
    const raw = localStorage.getItem(CARDS_KEY);
    const data = raw ? JSON.parse(raw) : [];
    state.cards = Array.isArray(data) ? data : (Array.isArray(data?.cards) ? data.cards : []);
  } catch(_) { state.cards = []; }
}

function reloadCards() {
  loadCards();
  renderSidebar();
  renderOrderPanel();
  renderCanvas();
  updateCardCount();
  showToast(`${state.cards.length}枚のカードを読み込みました`);
}

/* ══════════════════════════════════
   LAYOUT 保存・復元
══════════════════════════════════ */
function loadLayout() {
  try {
    const raw = localStorage.getItem(LAYOUT_KEY);
    const data = raw ? JSON.parse(raw) : {};
    state.layout = data.layout || data;
    state.sequence = Array.isArray(data.sequence) ? data.sequence.map(String) : [];
  } catch(_) { state.layout = {}; }
}
function saveLayout() {
  localStorage.setItem(LAYOUT_KEY, JSON.stringify({ layout: state.layout, sequence: orderedPlacedIds() }));
}
function exportLayout() {
  saveLayout();
  showToast('レイアウトを保存しました');
}

/* ══════════════════════════════════
   GROUP PALETTE
══════════════════════════════════ */
function renderGroupPalette() {
  const el = document.getElementById('group-palette');
  // preserve gp-label
  el.innerHTML = '<span class="gp-label">グループ:</span>';
  state.groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'group-chip' + (state.activeGroup===g.id?' selected':'');
    btn.style.cssText = `color:${g.color};border-color:${g.border};background:${g.border.replace('0.4','0.1')}`;
    btn.textContent = g.label;
    btn.onclick = () => {
      state.activeGroup = state.activeGroup===g.id ? null : g.id;
      renderGroupPalette();
      showToast(state.activeGroup ? `「${g.label}」グループを選択 — カードをクリックで割り当て` : 'グループ選択解除');
    };
    el.appendChild(btn);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-group-btn';
  addBtn.textContent = '＋ グループ追加';
  addBtn.onclick = addGroup;
  el.appendChild(addBtn);
}

function addGroup() {
  const label = prompt('グループ名', '新しいグループ');
  if (!label) return;
  const colors = ['#fd79a8','#00cec9','#fdcb6e','#6c5ce7','#00b894','#e17055'];
  const color  = colors[state.groups.length % colors.length];
  const id = 'g-' + Date.now();
  state.groups.push({ id, label, color, border: color.replace('#','rgba(').replace(/(..)(..)(..)/, (_,r,g,b)=>`${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)}`) + ',0.4)' });
  renderGroupPalette();
  renderCanvas();
}

/* ══════════════════════════════════
   SIDEBAR
══════════════════════════════════ */
function renderSidebar() {
  const el = document.getElementById('sb-list');
  if (!state.cards.length) {
    el.innerHTML = '<div class="sb-empty">🎤 まだフレーズカードがありません。<br>vocal-lab v3で録音・保存すると、ここに表示されます。</div>';
    return;
  }
  el.innerHTML = '';
  state.cards.forEach(card => {
    const onCanvas = !!state.layout[card.id];
    const div = document.createElement('div');
    div.className = 'sb-card' + (onCanvas?' on-canvas':'');
    div.title = onCanvas ? 'キャンバスに配置済み' : 'クリックでキャンバスに追加';
    div.innerHTML = `
      <div class="sb-card-top">
        <div class="sb-card-name">${escHtml(card.name)}</div>
        <button class="sb-info-btn" title="詳細を見る" onclick="event.stopPropagation();openCardDetail('${card.id}')">ⓘ</button>
      </div>
      <div class="sb-card-meta">${cardNotes(card).length}音符 · ${emotionLabel(card.emotion)}</div>
    `;
    if (!onCanvas) div.onclick = () => placeCard(card.id);
    el.appendChild(div);
  });
}

/* ══════════════════════════════════
   SONG ORDER
══════════════════════════════════ */
function normalizeSequence() {
  const cardIds = new Set(state.cards.map(c => String(c.id)));
  const placedIds = Object.keys(state.layout).map(String).filter(id => cardIds.has(id));
  state.sequence = state.sequence.filter(id => placedIds.includes(String(id)));
  placedIds
    .sort((a, b) => (state.layout[a]?.x ?? 0) - (state.layout[b]?.x ?? 0))
    .forEach(id => { if (!state.sequence.includes(id)) state.sequence.push(id); });
}

function orderedPlacedIds() {
  normalizeSequence();
  return [...state.sequence];
}

function renderOrderPanel() {
  const el = document.getElementById('order-list');
  if (!el) return;
  const ids = orderedPlacedIds();
  if (!ids.length) {
    el.innerHTML = '<div class="sb-empty">🎼 曲順はまだ空です。<br>左のカードをキャンバスに置くと、ここに順番が並びます。</div>';
    return;
  }
  el.innerHTML = '';
  ids.forEach((id, idx) => {
    const card = state.cards.find(c => String(c.id) === String(id));
    if (!card) return;
    const div = document.createElement('div');
    div.className = 'order-item' + (state.selectedCard === id ? ' selected' : '');
    div.innerHTML = `
      <div class="order-num">${idx + 1}</div>
      <div class="order-name" title="${escHtml(card.name)}">${escHtml(card.name)}</div>
      <div class="order-actions">
        <button class="mini-btn" onclick="moveInSequence('${id}',-1)" ${idx===0?'disabled':''}>↑</button>
        <button class="mini-btn" onclick="moveInSequence('${id}',1)" ${idx===ids.length-1?'disabled':''}>↓</button>
        <button class="mini-btn" onclick="removeFromCanvas('${id}',event)">×</button>
      </div>
    `;
    div.querySelector('.order-name').onclick = () => focusCard(id);
    el.appendChild(div);
  });
}

function moveInSequence(cardId, delta) {
  const ids = orderedPlacedIds();
  const from = ids.indexOf(String(cardId));
  const to = from + delta;
  if (from < 0 || to < 0 || to >= ids.length) return;
  const [id] = ids.splice(from, 1);
  ids.splice(to, 0, id);
  state.sequence = ids;
  saveLayout();
  renderOrderPanel();
  showToast('曲順を更新しました');
}

function focusCard(cardId) {
  const id = String(cardId);
  const pos = state.layout[id];
  if (!pos) return;
  state.selectedCard = id;
  renderCanvas();
  renderOrderPanel();
  const wrap = document.getElementById('canvas-wrap');
  wrap.scrollTo({
    left: Math.max(0, pos.x * state.zoom - wrap.clientWidth / 2 + 90),
    top: Math.max(0, pos.y * state.zoom - wrap.clientHeight / 2 + 55),
    behavior: 'smooth',
  });
}

/* ══════════════════════════════════
   カード詳細モーダル
   raw/AI補正・音符数・長さ・感情・メモを確認
══════════════════════════════════ */
function openCardDetail(cardId) {
  const card = state.cards.find(c => String(c.id) === String(cardId));
  if (!card) return;
  const notes = cardNotes(card);
  const rawNotes = Array.isArray(card.rawNotes) ? card.rawNotes.map(normalizeNote) : [];
  const totalBeats = notes.reduce((m, n) => Math.max(m, n.start + n.dur), 0);
  const created = card.createdAt ? new Date(card.createdAt).toLocaleString('ja-JP', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';

  const panel = document.getElementById('detail-modal-panel');
  panel.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${escHtml(card.name)}</div>
      <button class="modal-close" onclick="closeCardDetail()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-badges">
        <span class="modal-badge emotion">${emotionLabel(card.emotion)}</span>
        ${card.hasAi ? '<span class="modal-badge ai">✦ AI補正済み</span>' : ''}
        ${card.aiMode ? `<span class="modal-badge">モード: ${escHtml(card.aiMode)}</span>` : ''}
      </div>

      <div class="modal-meta-grid">
        <div class="modal-meta-item"><b>${notes.length}</b> 音符</div>
        <div class="modal-meta-item"><b>${totalBeats.toFixed(2)}</b> 拍の長さ</div>
        <div class="modal-meta-item"><b>${card.bpm || 120}</b> BPM</div>
        <div class="modal-meta-item">${created ? `<b>${created}</b> 作成` : ''}</div>
      </div>

      <div>
        <div class="modal-section-title">${card.hasAi ? 'AI補正後の音符' : '音符'}</div>
        <div class="modal-notes">${notes.length
          ? notes.map(n => `<span class="modal-note${card.hasAi ? ' ai' : ''}">${escHtml(n.name)}</span>`).join('')
          : '<span style="color:var(--tx3);font-size:11px">音符がありません</span>'}</div>
      </div>

      ${rawNotes.length ? `
      <div>
        <div class="modal-section-title">録音時の生データ</div>
        <div class="modal-notes">${rawNotes.map(n => `<span class="modal-note">${escHtml(n.name)}</span>`).join('')}</div>
      </div>` : ''}

      ${card.aiComment ? `
      <div>
        <div class="modal-section-title">AIコメント / メモ</div>
        <div class="modal-comment">${escHtml(card.aiComment)}</div>
      </div>` : ''}
    </div>
  `;
  document.getElementById('detail-modal').classList.add('show');
}
function closeCardDetail() {
  document.getElementById('detail-modal').classList.remove('show');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCardDetail();
});

/* ══════════════════════════════════
   CANVAS RENDER
══════════════════════════════════ */
function renderCanvas() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  // グループゾーン描画
  renderGroupZones(canvas);
  // カード描画
  Object.entries(state.layout).forEach(([cardId, pos]) => {
    const card = state.cards.find(c => String(c.id) === String(cardId));
    if (!card) return;
    canvas.appendChild(makePCard(card, pos));
  });
}

function renderGroupZones(canvas) {
  // 同一グループのカードを囲む矩形を描画
  const groupCards = {};
  Object.entries(state.layout).forEach(([cid, pos]) => {
    if (!pos.groupId) return;
    if (!groupCards[pos.groupId]) groupCards[pos.groupId] = [];
    groupCards[pos.groupId].push(pos);
  });
  Object.entries(groupCards).forEach(([gid, positions]) => {
    if (positions.length < 1) return;
    const group = state.groups.find(g => g.id === gid);
    if (!group) return;
    const PAD = 18, CW = 180, CH = 110;
    const xs = positions.map(p=>p.x);
    const ys = positions.map(p=>p.y);
    const x = Math.min(...xs) - PAD;
    const y = Math.min(...ys) - PAD - 18;
    const w = Math.max(...xs) + CW - x + PAD;
    const h = Math.max(...ys) + CH - y + PAD;
    const zone = document.createElement('div');
    zone.className = 'gzone';
    zone.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;border-color:${group.border};`;
    zone.innerHTML = `<span class="gzone-label" style="color:${group.color}">${escHtml(group.label)}</span>`;
    canvas.appendChild(zone);
  });
}

function makePCard(card, pos) {
  const group = pos.groupId ? state.groups.find(g=>g.id===pos.groupId) : null;
  const notes = cardNotes(card);
  const uniq  = [...new Set(notes.map(n=>n.name))].slice(0,6);
  const div   = document.createElement('div');
  div.className = 'pcard' + (state.selectedCard===String(card.id)?' selected':'');
  div.id = 'pcard-' + card.id;
  div.style.cssText = `left:${pos.x}px;top:${pos.y}px;`;
  div.innerHTML = `
    ${group ? `<div class="pcard-gbar" style="background:${group.color}"></div>` : ''}
    <div class="pcard-top">
      <div class="pcard-name">${escHtml(card.name)}</div>
      <button class="pcard-info-btn" title="詳細を見る" onclick="event.stopPropagation();openCardDetail('${card.id}')">ⓘ</button>
      <button class="pcard-del" onclick="removeFromCanvas('${card.id}',event)">✕</button>
    </div>
    <div class="pcard-notes">${uniq.map(n=>`<span class="pcard-note${card.hasAi?' ai':''}">${n}</span>`).join('')}</div>
    <div class="pcard-footer">
      <span class="pcard-emotion">${emotionLabel(card.emotion)}</span>
      ${card.hasAi?'<span class="pcard-ai-tag">AI</span>':''}
      <button class="pcard-play" id="play-${card.id}" onclick="togglePlay('${card.id}',event)">▶</button>
    </div>
  `;
  // ドラッグ
  div.addEventListener('mousedown', e => startDrag(e, String(card.id)));
  // グループ割り当てクリック
  div.addEventListener('click', e => {
    if (e.target.closest('.pcard-del') || e.target.closest('.pcard-play') || e.target.closest('.pcard-info-btn')) return;
    if (state.activeGroup) {
      assignGroup(String(card.id), state.activeGroup);
    } else {
      state.selectedCard = state.selectedCard===String(card.id) ? null : String(card.id);
      renderCanvas();
      renderOrderPanel();
    }
  });
  return div;
}

/* ══════════════════════════════════
   PLACE / REMOVE
══════════════════════════════════ */
function placeCard(cardId) {
  const id = String(cardId);
  if (state.layout[id]) return;
  // 空いている位置を探す
  const used = Object.values(state.layout).map(p=>`${p.x},${p.y}`);
  let x = 60, y = 80;
  while (used.includes(`${x},${y}`)) { x += 200; if (x > 2400) { x = 60; y += 130; } }
  state.layout[id] = { x, y, groupId: state.activeGroup || null };
  saveLayout();
  renderCanvas();
  renderSidebar();
  renderOrderPanel();
  updateCardCount();
}

function removeFromCanvas(cardId, e) {
  if (e) e.stopPropagation();
  const id = String(cardId);
  delete state.layout[id];
  state.sequence = state.sequence.filter(cid => cid !== id);
  saveLayout();
  renderCanvas();
  renderSidebar();
  renderOrderPanel();
  updateCardCount();
}

function assignGroup(cardId, groupId) {
  if (!state.layout[cardId]) return;
  state.layout[cardId].groupId = state.layout[cardId].groupId===groupId ? null : groupId;
  saveLayout();
  renderCanvas();
  const g = state.groups.find(g=>g.id===groupId);
  showToast(state.layout[cardId]?.groupId ? `「${g?.label}」に割り当てました` : 'グループ解除');
}

function clearCanvas() {
  if (!confirm('キャンバスをクリアしますか？')) return;
  state.layout = {};
  state.sequence = [];
  saveLayout();
  renderCanvas();
  renderSidebar();
  renderOrderPanel();
  updateCardCount();
  showToast('キャンバスをクリアしました');
}

/* ══════════════════════════════════
   AUTO LAYOUT
══════════════════════════════════ */
function autoLayout() {
  // グループ別に整列、未グループは右端
  const grouped = {};
  const ungrouped = [];
  Object.entries(state.layout).forEach(([cid, pos]) => {
    if (pos.groupId) {
      if (!grouped[pos.groupId]) grouped[pos.groupId] = [];
      grouped[pos.groupId].push(cid);
    } else { ungrouped.push(cid); }
  });
  const COL_W = 210, ROW_H = 130, START_X = 60, START_Y = 80;
  let colX = START_X;
  // グループ順に配置
  state.groups.forEach(g => {
    const cards = grouped[g.id];
    if (!cards?.length) return;
    cards.forEach((cid, i) => {
      state.layout[cid] = { ...state.layout[cid], x: colX, y: START_Y + i * ROW_H };
    });
    colX += COL_W;
  });
  // 未グループ
  ungrouped.forEach((cid, i) => {
    state.layout[cid] = { ...state.layout[cid], x: colX, y: START_Y + i * ROW_H };
  });
  saveLayout();
  renderCanvas();
  renderOrderPanel();
  showToast('自動整列しました');
}

/* ══════════════════════════════════
   DRAG
══════════════════════════════════ */
function startDrag(e, cardId) {
  if (e.target.closest('.pcard-del') || e.target.closest('.pcard-play') || e.target.closest('.pcard-info-btn')) return;
  e.preventDefault();
  const pos = state.layout[cardId];
  if (!pos) return;
  const wrap = document.getElementById('canvas-wrap');
  const wRect = wrap.getBoundingClientRect();
  const ox = e.clientX - wRect.left + wrap.scrollLeft - pos.x * state.zoom;
  const oy = e.clientY - wRect.top  + wrap.scrollTop  - pos.y * state.zoom;
  state.dragging = { cardId, ox, oy };
  const el = document.getElementById('pcard-' + cardId);
  if (el) el.classList.add('dragging');

  function onMove(e2) {
    if (!state.dragging) return;
    const x = Math.max(0, (e2.clientX - wRect.left + wrap.scrollLeft - state.dragging.ox) / state.zoom);
    const y = Math.max(0, (e2.clientY - wRect.top  + wrap.scrollTop  - state.dragging.oy) / state.zoom);
    state.layout[cardId].x = Math.round(x / 16) * 16; // 16pxグリッドスナップ
    state.layout[cardId].y = Math.round(y / 16) * 16;
    const el2 = document.getElementById('pcard-' + cardId);
    if (el2) { el2.style.left = state.layout[cardId].x + 'px'; el2.style.top = state.layout[cardId].y + 'px'; }
  }
  function onUp() {
    if (!state.dragging) return;
    const el3 = document.getElementById('pcard-' + state.dragging.cardId);
    if (el3) el3.classList.remove('dragging');
    state.dragging = null;
    saveLayout();
    renderCanvas(); // グループゾーン再描画
    renderOrderPanel();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

/* ══════════════════════════════════
   ZOOM
══════════════════════════════════ */
function setZoom(z) {
  state.zoom = Math.min(2, Math.max(0.3, z));
  document.getElementById('canvas').style.transform = `scale(${state.zoom})`;
  document.getElementById('canvas').style.transformOrigin = '0 0';
  document.getElementById('zoom-disp').textContent = Math.round(state.zoom*100)+'%';
}
function zoomIn()    { setZoom(state.zoom + 0.1); }
function zoomOut()   { setZoom(state.zoom - 0.1); }
function resetZoom() { setZoom(1.0); }

document.addEventListener('wheel', e => {
  if (e.ctrlKey || e.metaKey) { e.preventDefault(); setZoom(state.zoom + (e.deltaY < 0 ? 0.08 : -0.08)); }
}, { passive: false });

/* ══════════════════════════════════
   SYNTH PREVIEW
══════════════════════════════════ */
function togglePlay(cardId, e) {
  e.stopPropagation();
  if (state.playingCard === cardId) { stopPlay(); return; }
  stopPlay();
  const card = state.cards.find(c => String(c.id) === String(cardId));
  const notes = cardNotes(card);
  if (!notes.length) return;
  if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
  const BPM = 120, SPB = 60 / BPM;
  const now  = state.audioCtx.currentTime;
  const gain = state.audioCtx.createGain(); gain.gain.value = 0.4; gain.connect(state.audioCtx.destination);
  const oscs = [];
  notes.forEach(n => {
    const hz  = n.hz || (440 * Math.pow(2, ((n.midiR||60) - 69) / 12));
    const osc = state.audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = hz;
    const g   = state.audioCtx.createGain();
    const t0  = now + (n.start||0) * SPB;
    const t1  = t0  + (n.dur  ||1) * SPB;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.6, t0 + 0.02);
    g.gain.setValueAtTime(0.6, Math.max(t0 + 0.02, t1 - 0.03));
    g.gain.linearRampToValueAtTime(0, t1);
    osc.connect(g); g.connect(gain);
    osc.start(t0); osc.stop(t1 + 0.01);
    oscs.push(osc);
  });
  state.playSynth = oscs;
  state.playingCard = cardId;
  const btn = document.getElementById('play-' + cardId);
  if (btn) { btn.textContent = '■'; btn.classList.add('playing'); }
  const total = Math.max(...notes.map(n => n.start + n.dur), 0);
  state._playTimer = setTimeout(() => stopPlay(), (total * SPB + 0.3) * 1000);
}
function stopPlay() {
  if (state.playSynth) { state.playSynth.forEach(o => { try{o.stop();}catch(_){} }); state.playSynth = null; }
  clearTimeout(state._playTimer);
  if (state.playingCard) {
    const btn = document.getElementById('play-' + state.playingCard);
    if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
    state.playingCard = null;
  }
}

/* ══════════════════════════════════
   UTILS
══════════════════════════════════ */
const EMOTION_LABELS = { neutral:'ニュートラル', sad:'切ない', happy:'明るい', tense:'緊張感', nostalgic:'懐かしい', dark:'ダーク' };
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function pitchName(midiR) {
  return NOTE_NAMES[((midiR % 12) + 12) % 12] + (Math.floor(midiR / 12) - 1);
}
function normalizeNote(n) {
  const midiR = n?.midiR ?? n?.pitch ?? 60;
  return {
    name: n?.name || pitchName(midiR),
    midiR,
    hz: n?.hz || (440 * Math.pow(2, (midiR - 69) / 12)),
    start: Number(n?.start ?? n?.startBeat ?? 0),
    dur: Number(n?.dur ?? n?.durationBeats ?? 1),
    conf: Number(n?.conf ?? n?.confidence ?? 0.8),
  };
}
function cardNotes(card) {
  return (card?.notes || []).map(normalizeNote).filter(n => Number.isFinite(n.start) && Number.isFinite(n.dur));
}
function emotionLabel(e) { return EMOTION_LABELS[e] || e || ''; }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function updateCardCount() {
  const onCanvas = Object.keys(state.layout).length;
  document.getElementById('card-count').textContent = `${onCanvas} / ${state.cards.length} カード配置中`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ══════════════════════════════════
   SCORE-EDITOR 送信
   曲順パネルの順にカードを並べて
   melody.notes として送信
══════════════════════════════════ */
function sendToScoreEditor() {
  const ids = orderedPlacedIds();
  if (!ids.length) { showToast('キャンバスにカードがありません'); return; }
  const melodyNotes = [];
  let beatOffset = 0;
  ids.forEach(cardId => {
    const card = state.cards.find(c => String(c.id) === String(cardId));
    const notes = cardNotes(card);
    if (!notes.length) return;
    const maxDur = notes.reduce((m, n) => Math.max(m, n.start + n.dur), 0);
    notes.forEach(n => {
      melodyNotes.push({
        pitch:         n.midiR,
        startBeat:     parseFloat((beatOffset + n.start).toFixed(3)),
        durationBeats: parseFloat(n.dur.toFixed(3)),
        vel:           Math.round((n.conf * 80) + 20),
      });
    });
    beatOffset += Math.max(maxDur, 4);
  });
  if (!melodyNotes.length) { showToast('送信できる音符がありません'); return; }
  const payload = {
    version: '1.0', source: 'vocal-lab',
    name: `キャンバス (${ids.length}フレーズ)`,
    bpm: 120, timeSig: 4,
    melody: { notes: melodyNotes },
    chords: null, bass: { notes: [] }, drums: { notes: [] },
    exported: new Date().toISOString(),
  };
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  const seUrl = location.href.includes('apps/')
    ? 'score-editor-v2.html'
    : 'apps/score-editor-v2.html';
  window.location.href = seUrl + '#import=' + encodeURIComponent(b64);
}

/* ══════════════════════════════════
   BOOT
══════════════════════════════════ */
init();
</script>
