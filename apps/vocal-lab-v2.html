<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vocal-lab v2</title>
<style>
  :root {
    --bg: #0e0e11;
    --bg2: #18181d;
    --bg3: #22222a;
    --border: rgba(255,255,255,0.08);
    --border-hi: rgba(255,255,255,0.18);
    --text: #f0eef8;
    --text2: #9896a8;
    --text3: #5a5870;
    --accent: #7f77dd;
    --accent-hi: #afa9ec;
    --accent-dim: #3c3489;
    --accent-bg: rgba(127,119,221,0.12);
    --green: #1d9e75;
    --green-bg: rgba(29,158,117,0.12);
    --green-hi: #5dcaa5;
    --red: #e24b4a;
    --red-bg: rgba(226,75,74,0.1);
    --amber: #ef9f27;
    --amber-bg: rgba(239,159,39,0.1);
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--bg2);
    border-right: 0.5px solid var(--border);
    display: flex; flex-direction: column;
    padding: 0;
    overflow: hidden;
  }
  .main { display: flex; flex-direction: column; overflow: hidden; }

  /* ── SIDEBAR HEADER ── */
  .sidebar-header {
    padding: 20px 16px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--accent-hi);
    text-transform: uppercase;
  }
  .logo span { color: var(--text3); font-weight: 400; }

  /* ── CARD LIST ── */
  .card-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-list::-webkit-scrollbar { width: 4px; }
  .card-list::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

  .phrase-card {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .phrase-card:hover { border-color: var(--border-hi); }
  .phrase-card.active {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .card-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-notes {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .note-pill {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 20px;
    background: var(--accent-dim);
    color: var(--accent-hi);
    letter-spacing: 0.04em;
  }
  .card-meta {
    font-size: 11px;
    color: var(--text3);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .card-emotion-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 20px;
    background: var(--green-bg);
    color: var(--green-hi);
  }
  .card-delete {
    position: absolute;
    top: 8px; right: 8px;
    width: 20px; height: 20px;
    border: none;
    background: none;
    color: var(--text3);
    cursor: pointer;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .phrase-card:hover .card-delete { opacity: 1; }
  .card-delete:hover { color: var(--red); background: var(--red-bg); }

  /* ── EMPTY STATE ── */
  .empty-cards {
    padding: 24px 16px;
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    line-height: 1.8;
  }

  /* ── SIDEBAR FOOTER ── */
  .sidebar-footer {
    padding: 12px;
    border-top: 0.5px solid var(--border);
  }
  .btn-export {
    width: 100%;
    padding: 8px;
    border: 0.5px solid var(--border-hi);
    background: none;
    color: var(--text2);
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-export:hover { background: var(--bg3); color: var(--text); }

  /* ── MAIN HEADER ── */
  .main-header {
    padding: 20px 28px 0;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    flex-direction: column;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
  }

  /* ── EMOTION TAGS ── */
  .emotion-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .emotion-tag {
    padding: 4px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border-hi);
    background: none;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .emotion-tag:hover { background: var(--bg3); color: var(--text); }
  .emotion-tag.selected {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent-hi);
  }

  /* ── RECORDER AREA ── */
  .recorder-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    gap: 28px;
  }

  /* ── WAVEFORM ── */
  .waveform-wrap {
    width: 100%;
    max-width: 560px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
  }
  #waveform-canvas {
    width: 100%;
    height: 80px;
    display: block;
    border-radius: 6px;
  }

  /* ── PITCH DISPLAY ── */
  .pitch-row {
    display: flex;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 560px;
  }
  .pitch-current {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 20px;
    text-align: center;
    min-width: 100px;
  }
  .pitch-note { font-size: 28px; font-weight: 600; color: var(--accent-hi); }
  .pitch-hz { font-size: 11px; color: var(--text3); }
  .pitch-roll {
    flex: 1;
    overflow: hidden;
  }
  #pitch-canvas {
    width: 100%;
    height: 48px;
    display: block;
  }

  /* ── RECORD BUTTON ── */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .btn-rec {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, background 0.15s;
    box-shadow: 0 0 0 0 rgba(127,119,221,0.4);
  }
  .btn-rec:hover { transform: scale(1.04); }
  .btn-rec:active { transform: scale(0.97); }
  .btn-rec.recording {
    background: var(--red);
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(226,75,74,0.4); }
    70% { box-shadow: 0 0 0 14px rgba(226,75,74,0); }
    100% { box-shadow: 0 0 0 0 rgba(226,75,74,0); }
  }
  .btn-secondary {
    padding: 8px 18px;
    border: 0.5px solid var(--border-hi);
    background: none;
    color: var(--text2);
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { background: var(--bg3); color: var(--text); }
  .btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }

  .rec-status { font-size: 12px; color: var(--text3); }

  /* ── DETECTED NOTES PREVIEW ── */
  .detected-wrap {
    width: 100%;
    max-width: 560px;
  }
  .detected-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .detected-notes {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    min-height: 36px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    align-items: center;
  }
  .det-note {
    font-size: 13px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--bg3);
    border: 0.5px solid var(--border-hi);
    color: var(--text);
    position: relative;
    cursor: default;
  }
  .det-note .conf-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    border-radius: 0 0 20px 20px;
    background: var(--accent);
    transition: width 0.2s;
  }
  .det-note.low-conf { opacity: 0.5; }
  .det-empty { font-size: 12px; color: var(--text3); }

  /* ── COMMIT ROW ── */
  .commit-row {
    width: 100%;
    max-width: 560px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .phrase-name-input {
    flex: 1;
    padding: 8px 12px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .phrase-name-input:focus { border-color: var(--accent); }
  .phrase-name-input::placeholder { color: var(--text3); }
  .btn-commit {
    padding: 8px 18px;
    border: none;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-commit:hover { opacity: 0.85; }
  .btn-commit:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    background: var(--bg2);
    border-top: 0.5px solid var(--border);
    padding: 16px 28px;
    display: none;
  }
  .preview-panel.visible { display: block; }
  .preview-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .preview-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .preview-emotion { font-size: 11px; color: var(--green-hi); }
  .preview-notes {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .preview-note {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--accent-bg);
    color: var(--accent-hi);
    border: 0.5px solid var(--accent-dim);
  }
  .preview-controls {
    display: flex;
    gap: 8px;
  }
  .btn-play {
    padding: 6px 16px;
    border: 0.5px solid var(--green);
    background: var(--green-bg);
    color: var(--green-hi);
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-play:hover { background: rgba(29,158,117,0.22); }
  .btn-play.playing { border-color: var(--amber); background: var(--amber-bg); color: var(--amber); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--bg3);
    border: 0.5px solid var(--border-hi);
    border-radius: var(--radius);
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    transition: transform 0.25s ease;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">vocal-lab <span>v2</span></div>
    </div>
    <div class="card-list" id="card-list">
      <div class="empty-cards" id="empty-msg">
        フレーズをまだ保存していません。<br>録音してカードを作りましょう。
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-export" id="btn-export">JSON でエクスポート</button>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <div class="main-header">
      <div>
        <div class="section-title" style="margin-bottom:8px">感情タグ</div>
        <div class="emotion-row" id="emotion-row">
          <button class="emotion-tag selected" data-emotion="neutral">ニュートラル</button>
          <button class="emotion-tag" data-emotion="sad">切ない</button>
          <button class="emotion-tag" data-emotion="happy">明るい</button>
          <button class="emotion-tag" data-emotion="tense">緊張感</button>
          <button class="emotion-tag" data-emotion="nostalgic">懐かしい</button>
          <button class="emotion-tag" data-emotion="dark">ダーク</button>
        </div>
      </div>
    </div>

    <div class="recorder-area">

      <!-- WAVEFORM -->
      <div class="waveform-wrap">
        <canvas id="waveform-canvas"></canvas>
      </div>

      <!-- PITCH -->
      <div class="pitch-row">
        <div class="pitch-current">
          <div class="pitch-note" id="pitch-note">—</div>
          <div class="pitch-hz" id="pitch-hz">—</div>
        </div>
        <div class="pitch-roll">
          <canvas id="pitch-canvas"></canvas>
        </div>
      </div>

      <!-- CONTROLS -->
      <div class="controls-row">
        <button class="btn-secondary" id="btn-play-back" disabled>▶ 再生</button>
        <button class="btn-rec" id="btn-rec" title="録音開始">●</button>
        <div class="rec-status" id="rec-status">タップして録音</div>
      </div>

      <!-- DETECTED NOTES -->
      <div class="detected-wrap">
        <div class="detected-header">
          <span class="section-title">検出音符</span>
          <button class="btn-secondary" id="btn-clear-det" style="font-size:11px;padding:4px 10px" disabled>クリア</button>
        </div>
        <div class="detected-notes" id="detected-notes">
          <span class="det-empty">録音すると音符が表示されます</span>
        </div>
      </div>

      <!-- COMMIT -->
      <div class="commit-row">
        <input class="phrase-name-input" id="phrase-name" placeholder="フレーズ名（例: サビ冒頭）" />
        <button class="btn-commit" id="btn-commit" disabled>カードに保存</button>
      </div>

    </div><!-- /.recorder-area -->

    <!-- PREVIEW PANEL -->
    <div class="preview-panel" id="preview-panel">
      <div class="preview-header">
        <div class="preview-title" id="preview-title"></div>
        <div class="preview-emotion" id="preview-emotion"></div>
      </div>
      <div class="preview-notes" id="preview-notes"></div>
      <div class="preview-controls">
        <button class="btn-play" id="btn-preview-play">▶ 試聴</button>
      </div>
    </div>

  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════ */
const state = {
  recording: false,
  mediaRecorder: null,
  audioChunks: [],
  audioBlob: null,
  audioBuffer: null,       // decoded AudioBuffer
  analyser: null,
  sourceNode: null,
  animFrame: null,
  detectedNotes: [],       // [{note, hz, start, dur, confidence}]
  cards: [],               // saved phrase cards
  selectedEmotion: 'neutral',
  activeCardId: null,
  previewSynth: null,
  previewPlaying: false,
  pitchHistory: [],        // rolling array for pitch roll canvas
}

const AC = window.AudioContext || window.webkitAudioContext
let ac = null

/* ═══════════════════════════════════════════════════
   ELEMENTS
════════════════════════════════════════════════════ */
const btnRec       = document.getElementById('btn-rec')
const btnPlayBack  = document.getElementById('btn-play-back')
const btnClearDet  = document.getElementById('btn-clear-det')
const btnCommit    = document.getElementById('btn-commit')
const btnExport    = document.getElementById('btn-export')
const btnPrevPlay  = document.getElementById('btn-preview-play')
const recStatus    = document.getElementById('rec-status')
const pitchNote    = document.getElementById('pitch-note')
const pitchHz      = document.getElementById('pitch-hz')
const detectedEl   = document.getElementById('detected-notes')
const cardList     = document.getElementById('card-list')
const emptyMsg     = document.getElementById('empty-msg')
const phraseInput  = document.getElementById('phrase-name')
const previewPanel = document.getElementById('preview-panel')
const previewTitle = document.getElementById('preview-title')
const previewEmot  = document.getElementById('preview-emotion')
const previewNotes = document.getElementById('preview-notes')
const toastEl      = document.getElementById('toast')
const wvCanvas     = document.getElementById('waveform-canvas')
const pitchCanvas  = document.getElementById('pitch-canvas')
const wvCtx        = wvCanvas.getContext('2d')
const ptCtx        = pitchCanvas.getContext('2d')

/* ═══════════════════════════════════════════════════
   CANVAS SETUP
════════════════════════════════════════════════════ */
function resizeCanvases() {
  wvCanvas.width  = wvCanvas.offsetWidth  * devicePixelRatio
  wvCanvas.height = wvCanvas.offsetHeight * devicePixelRatio
  pitchCanvas.width  = pitchCanvas.offsetWidth  * devicePixelRatio
  pitchCanvas.height = pitchCanvas.offsetHeight * devicePixelRatio
  wvCtx.scale(devicePixelRatio, devicePixelRatio)
  ptCtx.scale(devicePixelRatio, devicePixelRatio)
}
window.addEventListener('resize', resizeCanvases)
setTimeout(resizeCanvases, 100)

/* ═══════════════════════════════════════════════════
   NOTE NAMES
════════════════════════════════════════════════════ */
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']
function freqToNote(hz) {
  if (hz <= 0) return null
  const midi  = 12 * Math.log2(hz / 440) + 69
  const midiR = Math.round(midi)
  const cents = (midi - midiR) * 100
  const name  = NOTE_NAMES[((midiR % 12) + 12) % 12]
  const oct   = Math.floor(midiR / 12) - 1
  return { name: `${name}${oct}`, midiR, cents, hz }
}

function noteToFreq(midiR) {
  return 440 * Math.pow(2, (midiR - 69) / 12)
}

/* ═══════════════════════════════════════════════════
   PITCH DETECTION — Autocorrelation (YIN-lite)
════════════════════════════════════════════════════ */
function detectPitch(buffer, sampleRate) {
  const SIZE  = buffer.length
  const START = Math.floor(sampleRate / 800)   // ~1250Hz upper
  const END   = Math.floor(sampleRate / 50)    // ~50Hz lower
  let minVal = Infinity, minIdx = -1

  // YIN difference function
  const yin = new Float32Array(END)
  for (let tau = START; tau < END; tau++) {
    let s = 0
    for (let i = 0; i < SIZE - tau; i++) {
      const d = buffer[i] - buffer[i + tau]
      s += d * d
    }
    yin[tau] = s
  }

  // Cumulative mean normalized
  yin[0] = 1
  let cumSum = 0
  for (let tau = 1; tau < END; tau++) {
    cumSum += yin[tau]
    yin[tau] = yin[tau] * tau / cumSum
  }

  // Absolute threshold
  const THRESH = 0.12
  let tau = START
  while (tau < END - 1) {
    if (yin[tau] < THRESH) {
      while (tau + 1 < END - 1 && yin[tau + 1] < yin[tau]) tau++
      minIdx = tau
      break
    }
    tau++
  }
  if (minIdx === -1) return null

  // Parabolic interpolation for sub-sample accuracy
  const x0 = minIdx > 0 ? minIdx - 1 : minIdx
  const x2 = minIdx < END - 1 ? minIdx + 1 : minIdx
  let refinedTau
  if (x0 === minIdx) {
    refinedTau = yin[minIdx] <= yin[x2] ? minIdx : x2
  } else if (x2 === minIdx) {
    refinedTau = yin[minIdx] <= yin[x0] ? minIdx : x0
  } else {
    const s0 = yin[x0], s1 = yin[minIdx], s2 = yin[x2]
    refinedTau = minIdx + (s2 - s0) / (2 * (2 * s1 - s2 - s0))
  }

  const confidence = 1 - yin[minIdx]
  const hz = sampleRate / refinedTau
  return { hz, confidence }
}

/* ═══════════════════════════════════════════════════
   DRAW WAVEFORM (live or static)
════════════════════════════════════════════════════ */
function drawWaveformLive(dataArray) {
  const W = wvCanvas.offsetWidth
  const H = wvCanvas.offsetHeight
  wvCtx.clearRect(0, 0, W, H)
  wvCtx.strokeStyle = '#7f77dd'
  wvCtx.lineWidth = 1.5
  wvCtx.beginPath()
  const sliceW = W / dataArray.length
  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i] / 128
    const y = (v * H) / 2
    i === 0 ? wvCtx.moveTo(0, y) : wvCtx.lineTo(i * sliceW, y)
  }
  wvCtx.stroke()
}

function drawWaveformStatic(audioBuffer) {
  const W = wvCanvas.offsetWidth
  const H = wvCanvas.offsetHeight
  wvCtx.clearRect(0, 0, W, H)
  const data = audioBuffer.getChannelData(0)
  const step = Math.ceil(data.length / W)
  wvCtx.fillStyle = '#534ab7'
  for (let i = 0; i < W; i++) {
    let max = 0
    for (let j = 0; j < step; j++) {
      const v = Math.abs(data[i * step + j] || 0)
      if (v > max) max = v
    }
    const h = max * H
    wvCtx.fillRect(i, (H - h) / 2, 1, h || 1)
  }
}

/* ═══════════════════════════════════════════════════
   PITCH ROLL CANVAS
════════════════════════════════════════════════════ */
function drawPitchRoll() {
  const W = pitchCanvas.offsetWidth
  const H = pitchCanvas.offsetHeight
  ptCtx.clearRect(0, 0, W, H)
  const hist = state.pitchHistory
  if (hist.length < 2) return

  const MIDI_MIN = 48, MIDI_MAX = 84  // C3..C6
  ptCtx.strokeStyle = '#7f77dd'
  ptCtx.lineWidth = 2
  ptCtx.beginPath()
  for (let i = 0; i < hist.length; i++) {
    const m = hist[i]
    if (m === null) continue
    const x = (i / (hist.length - 1)) * W
    const y = H - ((m - MIDI_MIN) / (MIDI_MAX - MIDI_MIN)) * H
    i === 0 || hist[i-1] === null ? ptCtx.moveTo(x, y) : ptCtx.lineTo(x, y)
  }
  ptCtx.stroke()
}

/* ═══════════════════════════════════════════════════
   QUANTIZE & SEGMENT detected notes
════════════════════════════════════════════════════ */
function quantizeToGrid(notes, gridBeat = 0.25) {
  return notes.map(n => ({
    ...n,
    startQ: Math.round(n.start / gridBeat) * gridBeat,
    durQ:   Math.max(gridBeat, Math.round(n.dur / gridBeat) * gridBeat),
  }))
}

/* ═══════════════════════════════════════════════════
   OFFLINE PITCH ANALYSIS (after recording stops)
════════════════════════════════════════════════════ */
async function analyzeRecording(blob) {
  if (!ac) ac = new AC()
  const arrayBuf = await blob.arrayBuffer()
  const audioBuf = await ac.decodeAudioData(arrayBuf)
  state.audioBuffer = audioBuf

  const data       = audioBuf.getChannelData(0)
  const sr         = audioBuf.sampleRate
  const frameSize  = 2048
  const hopSize    = 512
  const bpm        = 120
  const secPerBeat = 60 / bpm

  const segments = []
  let curNote  = null
  let curStart = 0

  for (let offset = 0; offset + frameSize < data.length; offset += hopSize) {
    const frame = data.slice(offset, offset + frameSize)
    const t     = offset / sr
    const res   = detectPitch(frame, sr)

    if (res && res.confidence > 0.6) {
      const noteInfo = freqToNote(res.hz)
      if (!noteInfo) continue

      if (curNote && curNote.midiR === noteInfo.midiR) {
        // extend current
        curNote.dur = t - curStart
        curNote.confidence = Math.max(curNote.confidence, res.confidence)
      } else {
        if (curNote && curNote.dur > 0.05) segments.push(curNote)
        curNote  = { ...noteInfo, start: t, dur: 0, confidence: res.confidence }
        curStart = t
      }
    } else {
      if (curNote && curNote.dur > 0.05) segments.push(curNote)
      curNote = null
    }
  }
  if (curNote && curNote.dur > 0.05) segments.push(curNote)

  // Convert start/dur to beat units
  const notesInBeats = segments.map(n => ({
    name:       n.name,
    midiR:      n.midiR,
    hz:         Math.round(n.hz),
    start:      parseFloat((n.start / secPerBeat).toFixed(3)),
    dur:        parseFloat((n.dur   / secPerBeat).toFixed(3)),
    confidence: parseFloat(n.confidence.toFixed(2)),
  }))

  state.detectedNotes = quantizeToGrid(notesInBeats, 0.25)
  drawWaveformStatic(audioBuf)
  renderDetectedNotes()
}

/* ═══════════════════════════════════════════════════
   RENDER DETECTED NOTES
════════════════════════════════════════════════════ */
function renderDetectedNotes() {
  const notes = state.detectedNotes
  detectedEl.innerHTML = ''
  if (notes.length === 0) {
    detectedEl.innerHTML = '<span class="det-empty">音符が検出されませんでした</span>'
    btnCommit.disabled = true
    btnClearDet.disabled = true
    return
  }
  btnCommit.disabled = false
  btnClearDet.disabled = false
  notes.forEach(n => {
    const el = document.createElement('div')
    el.className = 'det-note' + (n.confidence < 0.7 ? ' low-conf' : '')
    el.title = `${n.name}  conf:${n.confidence}  dur:${n.durQ}拍`
    el.textContent = n.name
    const bar = document.createElement('div')
    bar.className = 'conf-bar'
    bar.style.width = `${Math.round(n.confidence * 100)}%`
    el.appendChild(bar)
    detectedEl.appendChild(el)
  })
}

/* ═══════════════════════════════════════════════════
   EMOTION TAG UI
════════════════════════════════════════════════════ */
const emotionLabels = {
  neutral:   'ニュートラル',
  sad:       '切ない',
  happy:     '明るい',
  tense:     '緊張感',
  nostalgic: '懐かしい',
  dark:      'ダーク',
}
document.getElementById('emotion-row').addEventListener('click', e => {
  const btn = e.target.closest('.emotion-tag')
  if (!btn) return
  document.querySelectorAll('.emotion-tag').forEach(b => b.classList.remove('selected'))
  btn.classList.add('selected')
  state.selectedEmotion = btn.dataset.emotion
})

/* ═══════════════════════════════════════════════════
   RECORDING
════════════════════════════════════════════════════ */
btnRec.addEventListener('click', async () => {
  if (state.recording) {
    stopRecording()
  } else {
    await startRecording()
  }
})

async function startRecording() {
  try {
    if (!ac) ac = new AC()
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true })

    state.audioChunks = []
    state.detectedNotes = []
    state.pitchHistory  = []
    detectedEl.innerHTML = '<span class="det-empty">録音中…</span>'
    btnPlayBack.disabled = true
    btnCommit.disabled   = true
    btnClearDet.disabled = true

    // Live analysis setup
    const srcNode   = ac.createMediaStreamSource(stream)
    const analyser  = ac.createAnalyser()
    analyser.fftSize = 2048
    srcNode.connect(analyser)
    state.analyser  = analyser
    state.sourceNode = srcNode

    // MediaRecorder
    const mr = new MediaRecorder(stream)
    state.mediaRecorder = mr
    mr.ondataavailable = e => state.audioChunks.push(e.data)
    mr.onstop = async () => {
      stream.getTracks().forEach(t => t.stop())
      const blob = new Blob(state.audioChunks, { type: 'audio/webm' })
      state.audioBlob = blob
      await analyzeRecording(blob)
      btnPlayBack.disabled = false
      recStatus.textContent = '録音完了'
    }
    mr.start()
    state.recording = true
    btnRec.classList.add('recording')
    btnRec.textContent = '■'
    recStatus.textContent = '録音中…'

    // Live waveform + realtime pitch
    const dataArr = new Uint8Array(analyser.fftSize)
    const float32 = new Float32Array(analyser.fftSize)
    const PITCH_HIST_MAX = 120

    function liveLoop() {
      if (!state.recording) return
      state.animFrame = requestAnimationFrame(liveLoop)
      analyser.getByteTimeDomainData(dataArr)
      drawWaveformLive(dataArr)

      analyser.getFloatTimeDomainData(float32)
      const res = detectPitch(float32, ac.sampleRate)
      if (res && res.confidence > 0.65) {
        const ni = freqToNote(res.hz)
        if (ni) {
          pitchNote.textContent = ni.name
          pitchHz.textContent   = `${Math.round(res.hz)} Hz`
          state.pitchHistory.push(ni.midiR)
        }
      } else {
        pitchNote.textContent = '—'
        pitchHz.textContent   = '—'
        state.pitchHistory.push(null)
      }
      if (state.pitchHistory.length > PITCH_HIST_MAX)
        state.pitchHistory.shift()
      drawPitchRoll()
    }
    liveLoop()

  } catch (err) {
    showToast('マイクのアクセスが拒否されました')
    console.error(err)
  }
}

function stopRecording() {
  if (!state.mediaRecorder) return
  state.recording = false
  cancelAnimationFrame(state.animFrame)
  state.mediaRecorder.stop()
  btnRec.classList.remove('recording')
  btnRec.textContent = '●'
  recStatus.textContent = '解析中…'
  pitchNote.textContent = '—'
  pitchHz.textContent   = '—'
}

/* ═══════════════════════════════════════════════════
   PLAYBACK (recorded audio)
════════════════════════════════════════════════════ */
btnPlayBack.addEventListener('click', () => {
  if (!state.audioBlob) return
  const url = URL.createObjectURL(state.audioBlob)
  const audio = new Audio(url)
  btnPlayBack.textContent = '⏸ 停止'
  btnPlayBack.disabled = true
  audio.play()
  audio.onended = () => {
    btnPlayBack.textContent = '▶ 再生'
    btnPlayBack.disabled = false
    URL.revokeObjectURL(url)
  }
})

/* ═══════════════════════════════════════════════════
   CLEAR DETECTED
════════════════════════════════════════════════════ */
btnClearDet.addEventListener('click', () => {
  state.detectedNotes = []
  renderDetectedNotes()
})

/* ═══════════════════════════════════════════════════
   COMMIT → CARD
════════════════════════════════════════════════════ */
btnCommit.addEventListener('click', () => {
  const notes = state.detectedNotes
  if (notes.length === 0) return

  const name = phraseInput.value.trim() || `フレーズ ${state.cards.length + 1}`
  const card = {
    id:      Date.now(),
    name,
    emotion: state.selectedEmotion,
    notes:   notes.map(n => ({
      name:  n.name,
      midiR: n.midiR,
      hz:    n.hz,
      start: n.startQ,
      dur:   n.durQ,
      conf:  n.confidence,
    })),
    blob:    state.audioBlob,
    createdAt: new Date().toISOString(),
  }
  state.cards.push(card)
  phraseInput.value = ''
  state.detectedNotes = []
  renderDetectedNotes()
  renderCardList()
  selectCard(card.id)
  showToast(`「${name}」を保存しました`)
})

/* ═══════════════════════════════════════════════════
   CARD LIST RENDER
════════════════════════════════════════════════════ */
function renderCardList() {
  cardList.innerHTML = ''
  if (state.cards.length === 0) {
    cardList.appendChild(emptyMsg)
    return
  }
  state.cards.forEach(card => {
    const el = document.createElement('div')
    el.className = 'phrase-card' + (card.id === state.activeCardId ? ' active' : '')
    el.dataset.id = card.id

    const uniqNotes = [...new Set(card.notes.map(n => n.name))]

    el.innerHTML = `
      <div class="card-label">フレーズ</div>
      <div class="card-title">${escHtml(card.name)}</div>
      <div class="card-notes">${uniqNotes.map(n =>
        `<span class="note-pill">${n}</span>`).join('')}
      </div>
      <div class="card-meta">
        <span class="card-emotion-badge">${emotionLabels[card.emotion] || card.emotion}</span>
        <span>${card.notes.length}音符</span>
      </div>
      <button class="card-delete" data-del="${card.id}" title="削除">✕</button>
    `
    el.addEventListener('click', e => {
      if (e.target.closest('.card-delete')) return
      selectCard(card.id)
    })
    el.querySelector('.card-delete').addEventListener('click', e => {
      e.stopPropagation()
      deleteCard(card.id)
    })
    cardList.appendChild(el)
  })
}

function selectCard(id) {
  state.activeCardId = id
  renderCardList()
  const card = state.cards.find(c => c.id === id)
  if (!card) { previewPanel.classList.remove('visible'); return }
  showPreview(card)
}

function deleteCard(id) {
  state.cards = state.cards.filter(c => c.id !== id)
  if (state.activeCardId === id) {
    state.activeCardId = null
    previewPanel.classList.remove('visible')
  }
  renderCardList()
}

/* ═══════════════════════════════════════════════════
   PREVIEW PANEL
════════════════════════════════════════════════════ */
function showPreview(card) {
  previewTitle.textContent = card.name
  previewEmot.textContent  = emotionLabels[card.emotion] || card.emotion
  previewNotes.innerHTML   = card.notes.map(n =>
    `<span class="preview-note">${n.name}</span>`).join('')
  previewPanel.classList.add('visible')
  stopPreviewSynth()
}

btnPrevPlay.addEventListener('click', () => {
  if (state.previewPlaying) {
    stopPreviewSynth()
    return
  }
  const card = state.cards.find(c => c.id === state.activeCardId)
  if (!card) return
  playSynth(card)
})

function playSynth(card) {
  if (!ac) ac = new AC()
  if (ac.state === 'suspended') ac.resume()
  stopPreviewSynth()

  const BPM        = 120
  const secPerBeat = 60 / BPM
  const now        = ac.currentTime
  const gainNode   = ac.createGain()
  gainNode.gain.setValueAtTime(0.4, now)
  gainNode.connect(ac.destination)

  const oscs = []
  card.notes.forEach(n => {
    const osc = ac.createOscillator()
    osc.type = 'sine'
    osc.frequency.setValueAtTime(n.hz, now)
    const g = ac.createGain()
    const t0 = now + n.start * secPerBeat
    const t1 = t0 + n.dur  * secPerBeat
    g.gain.setValueAtTime(0, t0)
    g.gain.linearRampToValueAtTime(0.6, t0 + 0.02)
    g.gain.setValueAtTime(0.6, t1 - 0.03)
    g.gain.linearRampToValueAtTime(0, t1)
    osc.connect(g)
    g.connect(gainNode)
    osc.start(t0)
    osc.stop(t1 + 0.01)
    oscs.push(osc)
  })

  state.previewPlaying = true
  state.previewSynth   = oscs
  btnPrevPlay.textContent = '■ 停止'
  btnPrevPlay.classList.add('playing')

  // Auto-stop
  const totalBeats = Math.max(...card.notes.map(n => n.start + n.dur), 0)
  const totalSec   = totalBeats * secPerBeat + 0.2
  state._previewTimer = setTimeout(() => {
    stopPreviewSynth()
  }, totalSec * 1000)
}

function stopPreviewSynth() {
  if (state.previewSynth) {
    state.previewSynth.forEach(osc => { try { osc.stop() } catch(e){} })
    state.previewSynth = null
  }
  clearTimeout(state._previewTimer)
  state.previewPlaying = false
  btnPrevPlay.textContent = '▶ 試聴'
  btnPrevPlay.classList.remove('playing')
}

/* ═══════════════════════════════════════════════════
   EXPORT
════════════════════════════════════════════════════ */
btnExport.addEventListener('click', () => {
  const exportData = state.cards.map(c => ({
    id:        c.id,
    name:      c.name,
    emotion:   c.emotion,
    bpm:       120,
    notes:     c.notes,
    createdAt: c.createdAt,
  }))
  const json = JSON.stringify(exportData, null, 2)
  const blob = new Blob([json], { type: 'application/json' })
  const url  = URL.createObjectURL(blob)
  const a    = document.createElement('a')
  a.href     = url
  a.download = `vocal-lab-v2-${Date.now()}.json`
  a.click()
  URL.revokeObjectURL(url)
  showToast('エクスポートしました')
})

/* ═══════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════ */
function showToast(msg) {
  toastEl.textContent = msg
  toastEl.classList.add('show')
  clearTimeout(toastEl._timer)
  toastEl._timer = setTimeout(() => toastEl.classList.remove('show'), 2400)
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

/* ═══════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════ */
renderCardList()
</script>
</body>
</html>
